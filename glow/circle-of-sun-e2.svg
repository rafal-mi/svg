<!-- primitiveUnits = objectBoundingBox with feGaussianBlur 
     A very small tantard deviation interval to see enything
-->
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" 
xmlns:xlink="http://www.w3.org/1999/xlink" 
xmlns:svgjs="http://svgjs.dev/svgjs" 
viewBox="0 0 800 800"> 
  <style>
    :root {
      --sun-color: #ffffffaa;
      --sky-color: #fdd87dff; 
      --cloud-color: #fee390ff;
      --stripe-color: #f39e7fff;
    }
    #g1 {
      fill: rgba(180,158,132,0);
    }
  </style>
  <defs>
    <filter id="flood-filter" 
      x="-25%" y="0%"
      width="150%" height="100%" 
      filterUnits="objectBoundingBox"
      primitiveUnits="objectBoundingBox"
      >
      <feFlood
        x="-25%" y="0%"
        width="150%" height="100%"
        flood-color="red"
        flood-opacity="0.5" 
        />
    </filter>
    <filter id="glow-filter" 
      x="-25%" y="0%"
      width="150%" height="100%" 
      filterUnits="objectBoundingBox" 
      primitiveUnits="userSpaceOnUse" 
      >
      <feGaussianBlur stdDeviation="20" 
        x="-25%" y="0%"
        width="150%" height="100%"
        in_="SourceGraphic" 
        edgeMode_="none" result_="blur"
        />
   </filter>
  </defs>
  <rect 
    x="0" y="0" 
    width="800" height="800"
    fill="var(--sky-color)" 
    rx="16" ry="16" 
    />
  <path d="M 0 370 L 0 300 L 800 250 L 800 350 Z" 
    fill="var(--stripe-color)" 
    stroke_="white" 
    visibility="visible" 
    />
  <g>
    <circle
      cx="400"
      cy="400"
      r="100"
      fill="var(--sun-color)"
      stroke="white"
      visibility="hidden"
      />
    <circle
      cx="400"
      cy="400"
      r="100"
      fill="var(--sun-color)"
      filter="url(#glow-filter)"
      visibility="visible"
      />
  </g>
  <rect 
    x="300"
    y="300"
    width="200" 
    height="200" 
    fill="white"
    filter="url(#flood-filter)"
    visibility="hidden"
    />
</svg>