<svg xmlns="http://www.w3.org/2000/svg" version="1.1" 
xmlns:xlink="http://www.w3.org/1999/xlink" 
xmlns:svgjs="http://svgjs.dev/svgjs" 
viewBox="0 0 800 800"> 
  <style>
    :root {
      --sun-color: #ffffffaa;
      --sky-color: #fdd87dff; 
      --cloud-color: #fee390ff;
      --stripe-color: #f39e7fff;
    }
    #g1 {
      fill: #fbc27e00;
    }
  </style>
  <defs>
    <filter id="glow-filter" 
      x="-50%" y="-50%"
      width="200%" height="200%" 
      filterUnits="objectBoundingBox" 
      primitiveUnits="userSpaceOnUse" 
      >
      <feGaussianBlur stdDeviation="80" 
        x="0%" y="0%"
        width="100%" height="100%"
        in_="SourceGraphic" 
        edgeMode_="none" result_="blur"
        />
   </filter>
  </defs>
  <rect 
    x="0" y="0" 
    width="800" height="800"
    fill="var(--sky-color)" 
    rx="16" ry="16" 
    />
  <path d="M 0 370 L 0 300 L 800 230 L 800 350 Z" 
    fill="var(--stripe-color)"                                                                          
    stroke_="white" 
    visibility="visible" 
    />
  <path d="M 0 460 L 0 410 L 800 410 L 800 500
   Z" 
    fill="var(--stripe-color)" 
    stroke_="white" 
    visibility="visible" 
    />
  <g>
    <circle
      id="sun-glow"
      inkscape:label="sun-glow"
      cx="400"
      cy="400"
      r="300"
      fill="var(--sun-color)"
      filter="url(#glow-filter)"
      visibility="visible"
      />
    <circle
      id="sun"
      cx="400"
      cy="400"
      r="200"
      fill_="transparent"
      fill="var(--sun-color)"
      stroke="white"
      visibility="visible"
      />
  </g>
  <rect 
    x="300"
    y="300"
    width="200" 
    height="200" 
    fill="white"
    filter="url(#flood-filter)"
    visibility="hidden"
    />
</svg>