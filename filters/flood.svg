<svg xmlns="http://www.w3.org/2000/svg" 
  width="800" height="800">
  <defs>
    <filter id="floodFilter"
      x="-100%" y="0%"
      width="300%" height="100%" 
      filterUnits="objectBoundingBox"
      filterUnits_="userSpaceOnUse"
      primitiveUnits="objectBoundingBox"
      primitiveUnits_="userSpaceOnUse"
      >
      <feFlood
        x="-50%" y="0%"
        width="200%" height="100%"
        flood-color="red"
        flood-opacity="0.5" 
        />
    </filter>
  </defs>

  <!-- <use filter="url(#floodFilter)" /> -->

  <rect x="0" y="0" width="800" height="800"
  />  

  <rect 
    x="300"
    y="300"
    width="200" 
    height="200" 
    fill="white"
    filter="url(#floodFilter)"
    visibility="visible"
    />
  <rect 
    x="300"
    y="300"
    width="200"
    height="200"
    fill="transparent"
    stroke="white" 
    visibility="visible"
    />
</svg>