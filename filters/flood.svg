<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800">
  <defs>
    <filter id="floodFilter"
      x="0%"
      y="0%"
      width="100%"
      height="100%" 
      filterUnits="objectBoundingBox">
      <feFlood
        x="0%"
        y="0%"
        width="100%"
        height="100%"
        flood-color="orange"
        flood-opacity="0.5" />
    </filter>
  </defs>

  <rect 
    x="100"
    y="100"
    width="100" 
    height="100" 
    fill="url(#floodFilter)"
    fill="yellow"
    />
</svg>